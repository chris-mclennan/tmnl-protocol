name: Bug report
description: Something in tmnl-protocol isn't working as expected.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you encode / decode, what did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tmnl-protocol version
      description: The crate version or commit SHA.
    validations:
      required: true
  - type: dropdown
    id: side
    attributes:
      label: Which side?
      options:
        - Encoding (write_message)
        - Decoding (read_message)
        - A specific Message variant
        - Not sure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A failing round-trip is ideal — paste the Message and the assertion.
      render: rust
