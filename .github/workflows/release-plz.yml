# Automated releases via release-plz (https://release-plz.dev).
#
# On every push to `main`, release-plz opens/updates a "release PR" that bumps
# the version and updates CHANGELOG.md. Merging that PR tags the release and
# publishes to crates.io.
#
# Requires a CARGO_REGISTRY_TOKEN repository secret (a crates.io API token);
# the default GITHUB_TOKEN handles the PR + tag.
#
# tmnl-protocol has no dependencies, so it publishes cleanly on its own — and
# it must be published *before* the crates that depend on it (tmnl, mnml, mixr).

name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0
        with:
          command: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
